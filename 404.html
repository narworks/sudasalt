<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sayfa Bulunamadı — Suda Salt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #061829, #0A2540);
      color: #F0F0E4;
      font-family: 'Cormorant Garamond', Georgia, serif;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 500px; }
    h1 {
      font-family: 'Cinzel', Georgia, serif;
      font-size: 4rem;
      color: #D4A843;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.2rem;
      line-height: 1.7;
      margin-bottom: 2rem;
      color: rgba(240,240,228,0.7);
    }
    a {
      display: inline-block;
      font-family: 'Cinzel', Georgia, serif;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #D4A843;
      text-decoration: none;
      border: 1px solid rgba(212,168,67,0.4);
      padding: 0.75rem 2rem;
      border-radius: 50px;
      transition: all 0.4s ease;
    }
    a:hover {
      background: #D4A843;
      color: #0A2540;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>Aradığınız sayfa bulunamadı.<br>Belki de henüz keşfedilmemiş bir limandır.</p>
    <a href="/">Ana Sayfaya Dön</a>
  </div>
</body>
</html>
